<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helena Furtado | Arte</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#faf8f4;
color:#333;
}

header{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:#f5f1ea;
}

header h1{
font-size:60px;
margin-bottom:20px;
}

header p{
font-size:22px;
max-width:700px;
margin:auto;
line-height:1.7;
}

.botao{
display:inline-block;
margin-top:40px;
padding:15px 40px;
background:black;
color:white;
text-decoration:none;
border-radius:40px;
transition:.3s;
}

.botao:hover{
background:#555;
}

section{
padding:80px 10%;
}

h2{
font-size:42px;
margin-bottom:40px;
text-align:center;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:40px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:350px;
object-fit:cover;
}

.info{
padding:25px;
}

.info h3{
font-size:30px;
margin-bottom:10px;
}

.preco{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

footer{
padding:50px;
text-align:center;
background:#eee;
margin-top:80px;
}

</style>

</head>
<body>

<header>

<div>

<h1>Helena Furtado</h1>

<p>

Cada pintura nasce de uma emoção.
O verdadeiro significado da obra começa
quando encontra quem a contempla.

</p>

<a href="#galeria" class="botao">
Ver Galeria
</a>

</div>

</header>

<section id="galeria">

<h2>Galeria</h2>

<div class="galeria">

<div class="card">

<img src="watchingus1.jpg">

<div class="info">

<h3>Watching Us</h3>

<p>

Original em acrílico sobre tela.

100 × 80 cm

</p>

<p class="preco">
150 €
</p>

</div>

</div>

</div>

</section>

<footer>

© 2026 Helena Furtado | Todos os direitos reservados

</footer>

</body>
</html>
