<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helena Furtado Art</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#faf8f4;
color:#333;
}

header{
padding:40px 20px;
text-align:center;
}

header h1{
font-size:42px;
letter-spacing:2px;
margin-bottom:10px;
}

header p{
font-size:18px;
color:#666;
}

.hero img{
width:100%;
max-width:1000px;
display:block;
margin:40px auto;
border-radius:12px;
}

section{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

h2{
margin-bottom:20px;
font-size:32px;
}

p{
line-height:1.8;
font-size:18px;
}

footer{
text-align:center;
padding:40px;
color:#777;
}
</style>

</head>

<body>

<header>
<h1>Helena Furtado</h1>
<p>Arte Contemporânea</p>
</header>

<div class="hero">
<img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=1200" alt="Obra de arte">
</div>

<section>
<h2>Sobre</h2>

<p>
Bem-vindo ao meu espaço artístico.
Cada obra nasce da procura de equilíbrio entre cor, forma e emoção.
</p>

</section>

<footer>
© 2025 Helena Furtado Art
</footer>

</body>
</html>
